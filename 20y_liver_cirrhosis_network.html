    <script>

function resetHighlight() {
    // 모든 노드의 borderWidth 초기화
    var allNodes = nodes.get();
    var updated = allNodes.map(function(n) {
        n.borderWidth = 1;
        return n;
    });
    nodes.update(updated);
}

function focusNode(nodeId) {
    var node = nodes.get(nodeId);
    if (!node) {
        return;
    }

    var allNodes = nodes.get();
    var updated = allNodes.map(function(n) {
        n.borderWidth = (n.id === nodeId) ? 4 : 1;
        return n;
    });
    nodes.update(updated);

    network.focus(nodeId, {
        scale: 1.8,
        animation: { duration: 800, easingFunction: 'easeInOutQuad' }
    });
}

function searchNode() {
    var input = document.getElementById('geneSearch');
    var resultSpan = document.getElementById('searchResult');
    if (!input) {
        return;
    }
    var query = input.value.trim().toLowerCase();

    if (!query) {
        resultSpan.innerHTML = 'Enter a gene name.';
        resetHighlight();
        network.fit({animation: true});
        return;
    }

    var allNodes = nodes.get();

    // 🔍 부분 일치 검색 (contains), id 또는 label 기준, 대소문자 무시
    var matched = allNodes.filter(function(n) {
        var lbl = (n.label || '').toLowerCase();
        var idv = ('' + (n.id || '')).toLowerCase();
        return lbl.indexOf(query) !== -1 || idv.indexOf(query) !== -1;
    });

    if (matched.length === 0) {
        resultSpan.innerHTML = 'No matching gene.';
        resetHighlight();
        return;
    }

    // 매칭된 노드들 강조 (border 굵게)
    var updated = allNodes.map(function(n) {
        var hit = matched.some(function(m) { return m.id === n.id; });
        n.borderWidth = hit ? 4 : 1;
        return n;
    });
    nodes.update(updated);

    if (matched.length === 1) {
        // 🔹 한 개만 매칭된 경우: 바로 포커스
        var match = matched[0];
        network.focus(match.id, {
            scale: 1.8,
            animation: { duration: 800, easingFunction: 'easeInOutQuad' }
        });
        resultSpan.innerHTML = 'Found 1 gene: ' + (match.label || match.id);
    } else {
        // 🔹 여러 개 매칭된 경우: 클릭 가능한 리스트 생성
        var htmlList = 'Found ' + matched.length + ' genes: ';
        htmlList += matched.map(function(m, idx) {
            var label = m.label || m.id;
            // 각 gene 이름 옆에 클릭하면 해당 노드로 포커스
            return '<a href="#" onclick="focusNode(\'' + m.id + '\'); return false;">'
                   + label + '</a>';
        }).join(', ');
        resultSpan.innerHTML = htmlList;
    }
}
